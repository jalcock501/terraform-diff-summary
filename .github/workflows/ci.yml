name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: Run actionlint
        run: actionlint

  python:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run test

      - name: Run Ruff
        run: poetry run ruff check .

  action-smoke:
    name: Action smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Write sample Terraform plan JSON
        run: |
          cat > "$RUNNER_TEMP/tfplan.json" <<'JSON'
          {
            "resource_changes": [
              {
                "address": "aws_s3_bucket.version_only",
                "type": "aws_s3_bucket",
                "change": {
                  "actions": ["update"],
                  "before": {
                    "tags": {"Name": "same", "Version": "old"},
                    "tags_all": {"Name": "same", "Version": "old"}
                  },
                  "after": {
                    "tags": {"Name": "same", "Version": "new"},
                    "tags_all": {"Name": "same", "Version": "new"}
                  }
                }
              },
              {
                "address": "aws_s3_bucket.material",
                "type": "aws_s3_bucket",
                "change": {
                  "actions": ["update"],
                  "before": {
                    "bucket": "old",
                    "tags": {"Name": "old", "Version": "old"}
                  },
                  "after": {
                    "bucket": "new",
                    "tags": {"Name": "new", "Version": "new"}
                  }
                }
              },
              {
                "address": "aws_s3_bucket.noop",
                "type": "aws_s3_bucket",
                "change": {
                  "actions": ["no-op"],
                  "before": {"bucket": "same"},
                  "after": {"bucket": "same"}
                }
              }
            ]
          }
          JSON

      - name: Run local action
        uses: ./
        with:
          plan-json-path: ${{ runner.temp }}/tfplan.json
          ignored-tag-names: Version
          max-changed-fields: "8"
          summary-output-path: ${{ runner.temp }}/action-summary.md

      - name: Assert action summary
        run: |
          test -f "$RUNNER_TEMP/action-summary.md"
          grep -F "| Resource changes | 2 |" "$RUNNER_TEMP/action-summary.md"
          grep -F "| Filtered tag-only changes (Version) | 1 |" "$RUNNER_TEMP/action-summary.md"
          grep -F "| Changes shown below | 1 |" "$RUNNER_TEMP/action-summary.md"
          grep -F "\`aws_s3_bucket.material\`" "$RUNNER_TEMP/action-summary.md"
          grep -F "\`bucket, tags.Name\`" "$RUNNER_TEMP/action-summary.md"

          if grep -F "aws_s3_bucket.version_only" "$RUNNER_TEMP/action-summary.md"; then
            exit 1
          fi

          if grep -F "aws_s3_bucket.noop" "$RUNNER_TEMP/action-summary.md"; then
            exit 1
          fi

      - name: Run noisy fixture action
        uses: ./
        with:
          plan-json-path: example_tfplan/tfplan-json-noisy-sanitized.json
          ignored-tag-names: Version
          max-changed-fields: "8"
          summary-output-path: ${{ runner.temp }}/noisy-action-summary.md

      - name: Assert noisy fixture summary
        run: |
          test -f "$RUNNER_TEMP/noisy-action-summary.md"
          grep -F "| Resource changes | 66 |" "$RUNNER_TEMP/noisy-action-summary.md"
          grep -F "| Changes shown below | 66 |" "$RUNNER_TEMP/noisy-action-summary.md"
          grep -F "#### Replacements (16)" "$RUNNER_TEMP/noisy-action-summary.md"
          grep -F "#### Creates (9)" "$RUNNER_TEMP/noisy-action-summary.md"
          grep -F "#### Updates (41)" "$RUNNER_TEMP/noisy-action-summary.md"
          grep -F "\`aws_ecs_task_definition.app\`" "$RUNNER_TEMP/noisy-action-summary.md"
          grep -F "\`container_definitions, cpu, memory\`" "$RUNNER_TEMP/noisy-action-summary.md"

  pr-comment-smoke:
    name: PR comment smoke test
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Write sample Terraform plan JSON
        run: |
          cat > "$RUNNER_TEMP/tfplan.json" <<'JSON'
          {
            "resource_changes": [
              {
                "address": "aws_s3_bucket.material",
                "type": "aws_s3_bucket",
                "change": {
                  "actions": ["update"],
                  "before": {
                    "bucket": "old"
                  },
                  "after": {
                    "bucket": "new"
                  }
                }
              }
            ]
          }
          JSON

      - name: Run PR comment smoke action
        uses: ./
        with:
          plan-json-path: ${{ runner.temp }}/tfplan.json
          ignored-tag-names: Version
          max-changed-fields: "8"
          comment-on-pr: "true"
          comment-title: Terraform diff summary smoke test
          summary-output-path: ${{ runner.temp }}/pr-comment-action-summary.md

      - name: Assert PR comment smoke result
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GH_TOKEN"]
          url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments"
          request = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )

          with urllib.request.urlopen(request, timeout=30) as response:
              comments = json.loads(response.read().decode("utf-8"))

          expected = "## Terraform diff summary smoke test"
          if not any(expected in comment.get("body", "") for comment in comments):
              raise SystemExit("PR smoke-test comment was not found.")
          PY

  tag:
    name: Tag validation
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate tag
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          import tomllib
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          expected = re.escape(f"v{version}")
          tag_pattern = rf"{expected}(?:-\d+)?"

          if not re.fullmatch(tag_pattern, tag):
              sys.exit(
                  f"Tag {tag!r} must match pyproject version v{version} "
                  "or use a numeric suffix like v1.2.3-1"
              )
          PY
